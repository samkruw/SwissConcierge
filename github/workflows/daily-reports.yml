name: Daily Concierge Reports

on:
  schedule:
    # Täglich 05:00 UTC = 06:00 CH-Zeit (Winter) / 07:00 (Sommer)
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Auch manuell auslösbar via GitHub UI (Actions → Run workflow)

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin node-fetch

      - name: Generate daily reports
        env:
          FIREBASE_PROJECT_ID:    ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL:  ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:   ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
        run: node generate-reports.js
